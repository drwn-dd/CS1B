<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 1</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #2e2e2e;
    font-family: 'Poppins', sans-serif;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CONTAINER (MATCH YOUR MAIN DESIGN) */
.card {
    width: 600px;
    max-width: 95%;
    background-color: #1f3b1f;
    border: 2px solid #00ff00;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
}

/* TITLE */
h2 {
    color: #00ff00;
    margin-bottom: 20px;
}

/* CAROUSEL */
.carousel {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    scroll-snap-type: x mandatory;
    padding-bottom: 10px;
}

.carousel::-webkit-scrollbar {
    height: 8px;
}

.carousel::-webkit-scrollbar-thumb {
    background: #00ff00;
    border-radius: 10px;
}

/* ITEMS */
.carousel-item {
    flex: 0 0 auto;
    width: 200px;
    height: 140px;
    border: 2px solid #00ff00;
    border-radius: 15px;
    overflow: hidden;
    scroll-snap-align: start;
}

.carousel-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BUTTONS */
.note button {
    margin-top: 10px;
    margin-right: 5px;
    padding: 8px 10px;

    background: #223922;
    color: #00ff00;

    border: 1px solid #00ff00;
    border-radius: 8px;
    cursor: pointer;
}

/* BACK BUTTON */
.back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 18px;

    border: 2px solid #00ff00;
    border-radius: 10px;

    text-decoration: none;
    color: #00ff00;
}
</style>
</head>

<body>

<div class="card">
    <h2>Lab 1 - Carousel</h2>

    <div class="carousel">
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-1"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-2"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-3"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-4"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-5"></div>
        <div class="carousel-item"><img src="https://uploads.onecompiler.io/44e2kbb6m/44e2vz54d/IMG_0905.jpeg" id="item-6"></div>
    </div>

    <div class="note">
        <a href="#item-1"><button>1</button></a>
        <a href="#item-2"><button>2</button></a>
        <a href="#item-3"><button>3</button></a>
        <a href="#item-4"><button>4</button></a>
        <a href="#item-5"><button>5</button></a>
        <a href="#item-6"><button>6</button></a>
    </div>

    <p style="margin-top:15px;">BSCS 1B | ITEC50</p>

    <a href="index.html" class="back-btn">⬅ Back to Portfolio</a>
</div>

</body>
</html>
